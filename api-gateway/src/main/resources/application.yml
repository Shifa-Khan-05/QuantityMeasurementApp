server:
  port: 8080

spring:
  application:
    name: api-gateway

  config:
   import: "optional:classpath:application-secrets.yml"

  cloud:
    gateway:
      # CRITICAL FIX: The structure for Spring Boot 3.4/3.5 requires 'server.webflux'
      server:
        webflux:
          globalcors:
            add-to-chain: true
            cors-configurations:
              "[/**]":
                allowedOrigins: "http://localhost:5173"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: auth-service-combined
              uri: lb://auth-service
              predicates:
                - Path=/auth/**, /oauth2/**, /login/**

            - id: qma-service-route
              uri: lb://qma-service
              predicates:
                - Path=/api/v1/quantities/**
              filters:
                - StripPrefix=0

jwt:
  secretkey: ${GLOBAL_JWT_SECRET}

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
    instance-info-replication-interval-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always